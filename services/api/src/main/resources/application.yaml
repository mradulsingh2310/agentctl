spring:
  application:
    name: agentctl-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:agentctl}}
    username: ${POSTGRES_USER:agentctl}
    password: ${POSTGRES_PASSWORD:agentctl}
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

agentctl:
  temporal:
    enabled: ${AGENTCTL_TEMPORAL_ENABLED:true}
    address: ${TEMPORAL_ADDRESS:localhost:7233}
    namespace: ${TEMPORAL_NAMESPACE:default}
    task-queue: ${AGENTCTL_TEMPORAL_TASK_QUEUE:agentctl-runs}
  worker:
    enabled: ${AGENTCTL_WORKER_ENABLED:false}
  agent-worker:
    base-url: ${AGENTCTL_AGENT_WORKER_BASE_URL:http://agentctl-agent-worker:8090}
    protocol-version: ${AGENTCTL_AGENT_STEP_PROTOCOL_VERSION:2026-07-07}
    step-timeout: ${AGENTCTL_AGENT_STEP_TIMEOUT:30s}
