services:
  agentctl-api:
    build:
      context: ./services/api
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: local
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      POSTGRES_HOST: postgres
      TEMPORAL_ADDRESS: temporal:7233
      MINIO_ENDPOINT: http://minio:9000
      FGA_GATEWAY_BASE_URL: ${FGA_GATEWAY_BASE_URL:-http://host.docker.internal:8089}
    depends_on:
      - postgres
      - temporal
      - minio
      - otel-collector
    ports:
      - "8080:8080"

  agentctl-worker:
    build:
      context: ./services/api
    command:
      - "--spring.application.name=agentctl-worker"
      - "--server.port=8081"
    environment:
      SPRING_PROFILES_ACTIVE: local
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      POSTGRES_HOST: postgres
      TEMPORAL_ADDRESS: temporal:7233
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      - postgres
      - temporal
      - minio
      - otel-collector

  agentctl-agent-worker:
    build:
      context: ./services/agent-worker
    environment:
      AGENTCTL_API_BASE_URL: http://agentctl-api:8080
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      FGA_GATEWAY_BASE_URL: ${FGA_GATEWAY_BASE_URL:-http://host.docker.internal:8089}
    depends_on:
      - agentctl-api
      - ollama

  agentctl-web:
    build:
      context: ./services/web
    environment:
      NEXT_PUBLIC_AGENTCTL_API_BASE_URL: http://localhost:8080
    depends_on:
      - agentctl-api
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentctl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentctl}
      POSTGRES_DB: ${POSTGRES_DB:-agentctl}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:latest
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-agentctl}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-agentctl}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    depends_on:
      - postgres
    ports:
      - "7233:7233"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentctl}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agentctl-local-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/otel/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - otel-collector
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    depends_on:
      - prometheus
      - tempo
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  grafana-data:
  minio-data:
  ollama-data:
  postgres-data:
